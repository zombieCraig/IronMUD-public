name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Pin to 1.91 — matrix-sdk 0.16 hits a query-depth regression on
        # stable 1.92+ in CI environments. Revisit when matrix-sdk is
        # upgraded.
        uses: dtolnay/rust-toolchain@1.91
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (advisory)
        # Existing codebase has ~750 pre-fmt-sweep clippy findings. Run as
        # advisory for now; promote to `-- -D warnings` after a cleanup pass.
        run: cargo clippy --all-targets --all-features
        continue-on-error: true

      - name: cargo test
        run: cargo test --all --all-features

  audit:
    name: cargo audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        # Warnings (unmaintained transitive deps like fxhash, instant, rand)
        # are informational; fail only on actual vulnerabilities.
        run: cargo audit
